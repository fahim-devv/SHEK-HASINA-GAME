<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Endless Runner Game</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        /* Black canvas background to blend with your image */
        canvas {
            background: #000000; 
            display: block;
            border: 2px solid #fff;
        }
        .jump-btn {
            width: 300px;
            height: 50px;
            background: #007bff;
            color: white;
            text-align: center;
            font-size: 20px;
            line-height: 50px;
            margin-top: 10px;
            border-radius: 5px;
            user-select: none;
            cursor: pointer;
        }
        .jump-btn:active {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="200"></canvas>
    <!-- Jump Button -->
    <div class="jump-btn" onclick="jump()">Jump</div> 

    <script src="game.js"></script>
</body>
</html>
